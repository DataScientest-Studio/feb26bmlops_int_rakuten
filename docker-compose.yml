version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.0-python3.8
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@db:5432/dst_db
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "static_secret"
    _AIRFLOW_DB_UPGRADE: "true"
    AIRFLOW__WEBSERVER__LOG_FETCH_TIMEOUT: "30"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
    _AIRFLOW_WWW_USER_CREATE: "true"
    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data  # central acces for csvs
  user: "${AIRFLOW_UID:-50000}:0" # write rights
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    - db

services:
  db:
    container_name: pg_container
    image: postgres:13
    restart: always
    command: ["postgres", "-c", "listen_addresses=*"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dst_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/import_daten.sql:/docker-entrypoint-initdb.d/setup.sql
      - ./data:/data 
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d dst_db"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 180s

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: db init
    depends_on:
      db:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: always
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    restart: always
    command: scheduler
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"',
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: rakuten-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dst_db
      DAGSHUB_USER_TOKEN: ${DAGSHUB_USER_TOKEN:-}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-}
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: rakuten-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USER: ${AIRFLOW_USERNAME:-airflow}
      AIRFLOW_PASS: ${AIRFLOW_PASSWORD:-airflow}
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata: