version: '3.8'
services:
  db:
    container_name: pg_container
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dst_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/import_daten.sql:/docker-entrypoint-initdb.d/setup.sql
      - pgdata:/var/lib/postgresql

  api:
    container_name: rakuten_api
    build:
      context: .
      dockerfile: src/api/Dockerfile
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["uv", "run", "uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
volumes:
  pgdata: